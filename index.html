
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      window.process = { env: { NODE_ENV: 'production' } };
      window.addEventListener('error', function(event) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:20px;background:#fee;color:#900;border:2px solid #900;z-index:99999;font-family:sans-serif';
        div.innerHTML = '<h1>Boot Error Detected</h1><p>' + event.message + '</p><pre>' + (event.error ? event.error.stack : '') + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:20px;background:#fee;color:#900;border:2px solid #900;z-index:99999;font-family:sans-serif';
        div.innerHTML = '<h1>Promise Rejection</h1><p>' + event.reason + '</p>';
        document.body.appendChild(div);
      });
    </script>
    <title>Elite AI Assistant</title>
    <!-- Favicon -->
    <link rel="icon" href="https://image2url.com/r2/default/images/1773703333770-c9e20d08-1933-459c-a8c7-d7c78bf2bc22.png?v=5" type="image/png">
    <link rel="shortcut icon" href="https://image2url.com/r2/default/images/1773703333770-c9e20d08-1933-459c-a8c7-d7c78bf2bc22.png?v=5">
    <link rel="apple-touch-icon" href="https://image2url.com/r2/default/images/1773703333770-c9e20d08-1933-459c-a8c7-d7c78bf2bc22.png?v=5">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              accent: {
                red: '#ef4444',
                orange: '#fb923c',
                gold: '#facc15',
                cyan: '#22d3ee',
                pink: '#f472b6',
                lime: '#a3e635',
                violet: '#a78bfa',
                black: '#1f2937',
                teal: '#2dd4bf',
                emerald: '#34d399',
                sky: '#38bdf8',
                rose: '#fb7185',
              }
            },
            keyframes: {
              'gradient-pan': {
                '0%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
                '100%': { 'background-position': '0% 50%' },
              },
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'sonar-ping': {
                '0%': { transform: 'scale(0.5)', opacity: '0' },
                '50%': { opacity: '0.5' },
                '100%': { transform: 'scale(1.5)', opacity: '0' },
              },
            },
            animation: {
              'gradient-pan': 'gradient-pan 8s ease-in-out infinite',
              'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
              'sonar-ping': 'sonar-ping 2s ease-out infinite',
            }
          }
        }
      }
    </script>
    <style>
      html, body {
        background-color: transparent !important;
        margin: 0;
        padding: 0;
      }
      #root {
        background-color: transparent !important;
      }
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #fff;
        z-index: 1000;
        font-family: system-ui, -apple-system, sans-serif;
        color: #374151;
        transition: opacity 0.5s ease-out;
      }
      .dark #preloader {
        background-color: #111827;
        color: #f3f4f6;
      }
      .loader-dots div {
        width: 8px;
        height: 8px;
        margin: 0 4px;
        background: currentColor;
        border-radius: 50%;
        display: inline-block;
        animation: loader-dots 0.8s alternate infinite;
      }
      .loader-dots div:nth-child(2) { animation-delay: 0.2s; }
      .loader-dots div:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loader-dots {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0.2; transform: scale(0.5); }
      }
    </style>
</head>
  <body>
    <div id="preloader">
      <div class="loader-dots">
        <div></div><div></div><div></div>
      </div>
      <p style="margin-top: 1rem; font-weight: 500; font-size: 0.875rem; letter-spacing: 0.05em; text-transform: uppercase;">Booting Elite AI Assistant...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
